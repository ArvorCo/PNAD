name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black
      - name: ruff check
        run: ruff check scripts/ docs/
      - name: black --check
        run: black --check scripts/ docs/

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run test suite
        run: python -m pytest -q

  build-docs:
    name: Build interactive HTML essay
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Validate docs/index.template.html renders against fixtures
        run: |
          # Template sanity: ensures Python can substitute the known placeholders.
          # JS template literals like ${cls} are expected to remain and are ignored.
          python - <<'PY'
          import re
          from string import Template
          from pathlib import Path
          tpl = Template(Path('docs/index.template.html').read_text(encoding='utf-8'))
          html = tpl.safe_substitute(
              PAYLOAD='{"trimestral":{"modes":{"alvo":{}}},"anual":{"modes":{"alvo":{}}},"geojson":{"features":[]}}',
              BUILT_AT='ci',
              VINTAGE_TRI='ci',
              VINTAGE_ANN='ci',
          )
          assert '<title>' in html, 'template missing title'
          # Only check that our build placeholders (all UPPER_SNAKE) resolved.
          build_placeholders = re.findall(r'\$\{([A-Z_]+)\}', html)
          assert not build_placeholders, f'unresolved build placeholders: {build_placeholders}'
          print('template OK')
          PY
      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: |
            docs/index.html
            docs/index.template.html
            docs/build_index.py
            docs/artigo_pt.md
            docs/artigo_en.md
          if-no-files-found: warn
