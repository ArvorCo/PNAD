name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # for creating the GitHub Release
  id-token: write          # for PyPI Trusted Publishing

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/brasil-cli
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # no `password:` — uses OIDC trusted publishing
          skip-existing: true

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0         # so we can read the tag

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract version + changelog entry
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Pull the matching ## [VERSION] section from CHANGELOG.md
          awk -v v="$VERSION" '
            $0 ~ "^## \\["v"\\]" {found=1; print; next}
            found && /^## \[/ {found=0}
            found {print}
          ' CHANGELOG.md > /tmp/release_notes.md

          if [ ! -s /tmp/release_notes.md ]; then
            echo "Release $VERSION — see CHANGELOG.md" > /tmp/release_notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "brasil-cli ${{ steps.meta.outputs.version }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false
          files: |
            dist/*.whl
            dist/*.tar.gz
