<text x="80" y="90" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="22" letter-spacing="2" fill="#0aa36d" text-transform="uppercase">POST 6 / 10 · A AMOSTRA QUE A ATLAS DIZ TER</text><text x="80" y="170" font-family="Archivo Black, Impact, sans-serif" font-size="46" fill="#10141b" text-anchor="start">Renda familiar declarada.</text><text x="80" y="215" font-family="Libre Baskerville, Georgia, serif" font-weight="400" font-size="24" fill="#232831" text-anchor="start">Atlas (Q42) vs PNAD Contínua 16+ — onde a amostra escorrega.</text><text x="80" y="280" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="18" fill="#657079" text-anchor="start">FAIXA MENSAL FAMILIAR</text><text x="720" y="280" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="18" fill="#ed145b" text-anchor="end">ATLAS</text><text x="1000" y="280" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="18" fill="#0aa36d" text-anchor="end">PNAD 16+</text><text x="1330" y="280" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="18" fill="#10141b" text-anchor="end">Δ ATLAS − PNAD</text><line x1="80" y1="294" x2="1360" y2="294" stroke="#10141b" stroke-width="2"/><text x="80" y="332" font-family="Libre Baskerville, Georgia, serif" font-weight="700" font-size="26" fill="#10141b">R$ 0 – 2.000</text><text x="720" y="332" font-family="Spline Sans Mono, ui-monospace, monospace" font-weight="700" font-size="28" fill="#ed145b" text-anchor="end">22.8%</text><text x="1000" y="332" font-family="Spline Sans Mono, ui-monospace, monospace" font-weight="700" font-size="28" fill="#0aa36d" text-anchor="end">19.9%</text><text x="1180" y="332" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="22" fill="#1f86ff" text-anchor="end">▲</text><text x="1330" y="332" font-family="Spline Sans Mono, ui-monospace, monospace" font-weight="800" font-size="28" fill="#1f