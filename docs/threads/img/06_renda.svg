e, monospace" font-weight="700" font-size="28" fill="#ed145b" text-anchor="end">24.0%</text><text x="1000" y="494" font-family="Spline Sans Mono, ui-monospace, monospace" font-weight="700" font-size="28" fill="#0aa36d" text-anchor="end">25.7%</text><text x="1180" y="494" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="22" fill="#d11149" text-anchor="end">▼</text><text x="1330" y="494" font-family="Spline Sans Mono, ui-monospace, monospace" font-weight="800" font-size="28" fill="#d11149" text-anchor="end">−1.7 p.p.</text><line x1="80" y1="506" x2="1360" y2="506" stroke="#d8ddd9" stroke-width="1"/><text x="80" y="548" font-family="Libre Baskerville, Georgia, serif" font-weight="700" font-size="26" fill="#10141b">Acima de R$ 10.000</text><text x="720" y="548" font-family="Spline Sans Mono, ui-monospace, monospace" font-weight="700" font-size="28" fill="#ed145b" text-anchor="end">13.1%</text><text x="1000" y="548" font-family="Spline Sans Mono, ui-monospace, monospace" font-weight="700" font-size="28" fill="#0aa36d" text-anchor="end">16.0%</text><text x="1180" y="548" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="22" fill="#d11149" text-anchor="end">▼</text><text x="1330" y="548" font-family="Spline Sans Mono, ui-monospace, monospace" font-weight="800" font-size="28" fill="#d11149" text-anchor="end">−2.9 p.p.</text><line x1="80" y1="560" x2="1360" y2="560" stroke="#d8ddd9" stroke-width="1"/><text x="80" y="650" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="24" fill="#1f86ff" text-anchor="start">▲</text><text x="112" y="650" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="700" font-size="20" fill="#10141b" text-anchor="start">Azul = Atlas acima da PNAD</text><text x="440" y="650" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="24" fill="#0aa36d" text-anchor="start">●</text><text x="472" y="650" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="700" font-size="20" fill="#10141b" text-anchor="start">Verde = dentro do alvo (|Δ| ≤ 1 p.p.)</text><text x="900" y="650" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="24" fill="#d11149" text-anchor="start">▼</text><text x="932" y="650" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="700" font-size="20" fill="#10141b" text-anchor="start">Vermelho = Atlas abaixo da PNAD</text><text x="80" y="705" font-family="Libre Baskerville, Georgia, serif" font-weight="400" font-size="22" fill="#232831" text-anchor="start">Onde mais escorrega: classe média baixa (R$ 2–3 mil) inflada +6,0 p.p.</text><text x="80" y="738" font-family="Libre Baskerville, Georgia, serif" font-weight="400" font-size="22" fill="#232831" text-anchor="start">Faixa central (R$ 3–5 mil), onde a PNAD concentra famílias, perde 4,3 p.p.</text><line x1="80" y1="828" x2="1520" y2="828" stroke="#10141b" stroke-width="1"/><text x="80" y="864" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="20" fill="#657079" text-anchor="start">ARVOR INTELLIGENCE / dossiê eleitoral</text><text x="1520" y="864" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="20" fill="#657079" text-anchor="end">@leonardodias  ·  arvor.co</text></svg>