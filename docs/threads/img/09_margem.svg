<text x="80" y="110" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="22" letter-spacing="2" fill="#0aa36d" text-transform="uppercase">POST 9 / 10 · A ARITMÉTICA DA INCERTEZA</text><text x="80" y="220" font-family="Archivo Black, Impact, sans-serif" font-size="56" fill="#10141b" text-anchor="start">±1 p.p. exige n = 9.604.</text><text x="80" y="290" font-family="Archivo Black, Impact, sans-serif" font-size="56" fill="#ed145b" text-anchor="start">A Atlas tem 5.032.</text><text x="120" y="420" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="20" fill="#10141b" text-anchor="start">AMOSTRA EFETIVA DA ATLAS</text><rect x="120" y="440" width="691" height="60" fill="#ed145b"/><text x="140" y="480" font-family="Spline Sans Mono, ui-monospace, monospace" font-weight="800" font-size="26" fill="#ffffff" text-anchor="start">n = 5.032</text><text x="1440" y="480" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="26" fill="#ed145b" text-anchor="end">→ ±1,38 p.p.</text><text x="120" y="580" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="20" fill="#10141b" text-anchor="start">AMOSTRA NECESSÁRIA PARA ±1 p.p. (AAS, 95%, p=0,5)</text><rect x="120" y="600" width="1320" height="60" fill="#0aa36d"/><text x="140" y="640" font-family="Spline Sans Mono, ui-monospace, monospace" font-weight="800" font-size="26" fill="#ffffff" text-anchor="start">n = 9.604</text><text x="1440" y="640" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="26" fill="#0aa36d" text-anchor="end">→ ±1,0 p.p.</text><text x="80" y="760" font-family="Libre Baskerville, Georgia, serif" font-weight="400" font-size="22" fill="#232831" text-anchor="start">A Atlas vende precisão de ±1 p.p. publicamente. A matemática diz outra coisa.</text><line x1="80" y1="828" x2="1520" y2="828" stroke="#10141b" stroke-width="1"/><text x="80" y="864" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="20" fill="#657079" text-anchor="start">ARVOR INTELLIGENCE / dossiê eleitoral</text><text x="1520" y="864" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="20" fill="#657079" text-anchor="end">@leonardodias  ·  arvor.co</text></svg>