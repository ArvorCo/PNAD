xt-anchor="middle">RDR online</text><text x="1350" y="460" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="600" font-size="22" fill="#bbb" text-anchor="middle">Coleta 13–18.MAI</text><text x="1350" y="500" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="600" font-size="22" fill="#bbb" text-anchor="middle">Margem ±1,38 p.p.</text><text x="1350" y="560" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="20" fill="#f7b81e" text-anchor="middle">Reg. TSE</text><text x="1350" y="595" font-family="Spline Sans Mono, ui-monospace, monospace" font-weight="600" font-size="22" fill="#ffffff" text-anchor="middle">BR-06939/2026</text><line x1="80" y1="828" x2="1520" y2="828" stroke="#10141b" stroke-width="1"/><text x="80" y="864" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="20" fill="#657079" text-anchor="start">ARVOR INTELLIGENCE / dossiê eleitoral</text><text x="1520" y="864" font-family="Source Sans 3, Helvetica, sans-serif" font-weight="800" font-size="20" fill="#657079" text-anchor="end">@leonardodias  ·  arvor.co</text></svg>